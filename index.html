<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FasTik — Дошка оголошень</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">FasTik</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Пошук по оголошенням...">
                <button id="headerSearchBtn" onclick="searchAds()">Знайти</button>
            </div>
            <div class="header-right">
                <select id="langSelect" onchange="changeLanguage()">
                    <option value="uk">🇺🇦 UA</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
                <button id="headerLoginBtn" class="login-btn" onclick="goToCabinet()">Увійти</button>
                <button id="headerAddBtn" class="add-btn" onclick="openModal()">+ Подати оголошення</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="categories">
            <button id="catAll" class="active" onclick="filterCategory('all')">Всі</button>
            <button id="catElectronics" onclick="filterCategory('electronics')">Електроніка</button>
            <button id="catTransport" onclick="filterCategory('transport')">Транспорт</button>
            <button id="catHome" onclick="filterCategory('home')">Для дому</button>
        </section>

        <div class="ads-grid" id="adsGrid"></div>
    </main>

    <div id="adModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="adModalTitle">Нове оголошення</h2>
            <form id="adForm" onsubmit="addAd(event)">
                <input type="text" id="titleInput" placeholder="Назва товару" required>
                <input type="number" id="priceInput" placeholder="Ціна (грн)" required>
                <textarea id="descInput" placeholder="Опис товару" required></textarea>
                <select id="categoryInput">
                    <option value="electronics">Електроніка</option>
                    <option value="transport">Транспорт</option>
                    <option value="home">Для дому</option>
                </select>
                <input type="text" id="imageInput" placeholder="Посилання на картинку (URL-адрес)">
                <button type="submit" id="adSubmitBtn">Опублікувати</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
