<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Рейтинг та відгуки — FasTik</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="rating.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-top">
        <div class="container">
            <div class="logo">
                <a href="index.html">FasTik</a>
                <span class="logo-dot">❤</span>
            </div>
            <div class="header-actions">
                <select id="langSelect" class="lang-select" onchange="changeLanguage()">
                    <option value="uk">🇺🇦 Українська</option>
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="en">🇬🇧 English</option>
                </select>
                <button class="login-btn" onclick="window.location.href='cabinet.html'">Мій кабінет</button>
                <button class="add-btn" onclick="window.location.href='create-ad.html'">+ Подати оголошення</button>
            </div>
        </div>
    </div>
</header>

<!-- MAIN RATING CONTAINER -->
<main class="rating-container">
    <div class="container">
        <div class="rating-header">
            <h1>Рейтинг та відгуки</h1>
            <p>Оцінюйте продавців та покупців після успішних угод</p>
        </div>

        <div class="rating-tabs">
            <button class="rating-main-tab active" data-tab="my-rating">
                ⭐ Мій рейтинг
                <span class="new-badge">НОВИНКА</span>
            </button>
            <button class="rating-main-tab" data-tab="to-rate">
                📝 Продавці на оцінку
                <span id="toRateCount" class="count-badge">0</span>
            </button>
            <button class="rating-main-tab" data-tab="given">
                ✅ Поставлені оцінки
            </button>
            <button class="rating-main-tab" data-tab="received">
                📊 Отримані оцінки
            </button>
        </div>

        <!-- Вкладка: Мій рейтинг -->
        <div id="myRatingPage" class="rating-page active">
            <div class="rating-summary">
                <div class="rating-score-card">
                    <div class="rating-score">4.8</div>
                    <div class="rating-stars" id="myRatingStars">★★★★★</div>
                    <div class="rating-count">128 відгуків</div>
                </div>
                <div class="rating-stats">
                    <div class="stat-bar">
                        <span>5 ★</span>
                        <div class="bar"><div class="fill" style="width: 85%"></div></div>
                        <span>85%</span>
                    </div>
                    <div class="stat-bar">
                        <span>4 ★</span>
                        <div class="bar"><div class="fill" style="width: 10%"></div></div>
                        <span>10%</span>
                    </div>
                    <div class="stat-bar">
                        <span>3 ★</span>
                        <div class="bar"><div class="fill" style="width: 3%"></div></div>
                        <span>3%</span>
                    </div>
                    <div class="stat-bar">
                        <span>2 ★</span>
                        <div class="bar"><div class="fill" style="width: 1%"></div></div>
                        <span>1%</span>
                    </div>
                    <div class="stat-bar">
                        <span>1 ★</span>
                        <div class="bar"><div class="fill" style="width: 1%"></div></div>
                        <span>1%</span>
                    </div>
                </div>
            </div>
            
            <div class="badges-section">
                <h3>Нагороди та відзнаки</h3>
                <div class="badges-grid" id="badgesGrid"></div>
            </div>

            <div class="reviews-section">
                <h3>Відгуки про мене</h3>
                <div id="myReviewsList" class="reviews-list"></div>
            </div>
        </div>

        <!-- Вкладка: Продавці на оцінку -->
        <div id="toRatePage" class="rating-page">
            <div class="info-message">
                ⏳ У вас є <strong>60 днів</strong>, щоб оцінити продавця після отримання посилки з FasTik Доставка.
            </div>
            <div id="toRateList" class="to-rate-list"></div>
        </div>

        <!-- Вкладка: Поставлені оцінки -->
        <div id="givenPage" class="rating-page">
            <div class="filter-bar">
                <select id="givenFilter" onchange="filterGivenReviews()">
                    <option value="all">Всі оцінки</option>
                    <option value="5">5 ★</option>
                    <option value="4">4 ★</option>
                    <option value="3">3 ★</option>
                    <option value="2">2 ★</option>
                    <option value="1">1 ★</option>
                </select>
            </div>
            <div id="givenReviewsList" class="reviews-list"></div>
        </div>

        <!-- Вкладка: Отримані оцінки -->
        <div id="receivedPage" class="rating-page">
            <div class="filter-bar">
                <select id="receivedFilter" onchange="filterReceivedReviews()">
                    <option value="all">Всі оцінки</option>
                    <option value="5">5 ★</option>
                    <option value="4">4 ★</option>
                    <option value="3">3 ★</option>
                    <option value="2">2 ★</option>
                    <option value="1">1 ★</option>
                </select>
            </div>
            <div id="receivedReviewsList" class="reviews-list"></div>
        </div>
    </div>
</main>

<!-- МОДАЛЬНЕ ВІКНО ДЛЯ ОЦІНЮВАННЯ -->
<div id="rateModal" class="modal">
    <div class="modal-content modal-medium">
        <span class="close" onclick="closeModal('rateModal')">&times;</span>
        <h3 id="rateModalTitle">Оцінити продавця</h3>
        <div id="rateProductInfo" class="product-info"></div>
        
        <div class="rating-input">
            <label>Ваша оцінка</label>
            <div class="star-rating" id="starRating">
                <span class="star" data-value="1">☆</span>
                <span class="star" data-value="2">☆</span>
                <span class="star" data-value="3">☆</span>
                <span class="star" data-value="4">☆</span>
                <span class="star" data-value="5">☆</span>
            </div>
        </div>

        <div class="form-group">
            <label>Ваш відгук</label>
            <textarea id="reviewText" rows="4" placeholder="Розкажіть про ваш досвід співпраці..."></textarea>
        </div>

        <div class="form-group">
            <label>Плюси (необов'язково)</label>
            <input type="text" id="reviewPros" placeholder="Наприклад: швидка доставка, якісний товар">
        </div>

        <div class="form-group">
            <label>Мінуси (необов'язково)</label>
            <input type="text" id="reviewCons" placeholder="Наприклад: довга відповідь">
        </div>

        <div class="photo-attach">
            <button class="btn-secondary" onclick="attachPhoto()">📷 Додати фото</button>
            <div id="reviewPhotos" class="review-photos"></div>
        </div>

        <button class="btn-primary" onclick="submitRating()" style="width: 100%;">Опублікувати відгук</button>
    </div>
</div>

<script src="script.js"></script>
<script src="rating.js"></script>
</body>
</html>
