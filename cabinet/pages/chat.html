<div class="chat-container">
    <div class="chat-sidebar">
        <div class="chat-sidebar-header">
            <h2>Повідомлення</h2>
            <div class="chat-tabs">
                <button class="chat-tab-btn active" data-filter="all">Всі</button>
                <button class="chat-tab-btn" data-filter="unread">
                    Непрочитані
                    <span id="unreadCount" class="unread-badge">0</span>
                </button>
            </div>
            <div class="chat-search">
                <input type="text" id="chatSearchInput" placeholder="Пошук повідомлень...">
            </div>
        </div>
        <div id="chatList" class="chat-list">
            <!-- Список чатів буде завантажено з JS -->
        </div>
    </div>

    <div class="chat-main" id="chatMain">
        <div class="chat-placeholder">
            <div class="placeholder-icon">💬</div>
            <h3>Виберіть чат</h3>
            <p>Натисніть на діалог, щоб почати спілкування</p>
        </div>
    </div>
</div>

<!-- Модальне вікно для нового повідомлення -->
<div id="newChatModal" class="modal" style="display: none;">
    <div class="modal-content modal-small">
        <span class="close" onclick="closeNewChatModal()">&times;</span>
        <h3>Нове повідомлення</h3>
        <div class="form-group">
            <label>Кому</label>
            <input type="text" id="newChatRecipient" placeholder="Ім'я користувача">
        </div>
        <div class="form-group">
            <label>Повідомлення</label>
            <textarea id="newChatMessage" rows="4" placeholder="Введіть ваше повідомлення..."></textarea>
        </div>
        <button class="btn-primary" onclick="sendNewMessage()" style="width:100%">Відправити</button>
    </div>
</div>
