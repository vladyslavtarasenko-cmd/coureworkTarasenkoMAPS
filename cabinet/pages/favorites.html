<div class="favorites-container">
    <div class="favorites-header">
        <h1>Обрані</h1>
        <p>Зберігайте цікаві оголошення та пошуки</p>
    </div>

    <div class="favorites-tabs">
        <button class="fav-tab active" data-tab="ads">❤️ Обрані оголошення <span id="favAdsCount" class="tab-count">0</span></button>
        <button class="fav-tab" data-tab="searches">🔍 Збережені пошуки <span id="favSearchesCount" class="tab-count">0</span></button>
        <button class="fav-tab" data-tab="recent">🕐 Недавно переглянуті <span id="favRecentCount" class="tab-count">0</span></button>
    </div>

    <div id="favoritesAds" class="fav-content active">
        <div class="fav-actions"><button class="btn-secondary" onclick="clearAllFavorites()">Очистити всі</button></div>
        <div id="favoritesList" class="favorites-grid"></div>
    </div>

    <div id="favoritesSearches" class="fav-content">
        <div id="savedSearchesList" class="saved-searches-list"></div>
    </div>

    <div id="favoritesRecent" class="fav-content">
        <div class="fav-actions"><button class="btn-secondary" onclick="clearAllRecent()">Очистити історію</button></div>
        <div id="recentList" class="favorites-grid"></div>
    </div>
</div>

<div id="saveSearchModal" class="modal" style="display:none">
    <div class="modal-content modal-small">
        <span class="close" onclick="closeModal('saveSearchModal')">&times;</span>
        <h3>Зберегти пошук</h3>
        <div class="form-group"><label>Назва пошуку</label><input type="text" id="searchName" placeholder="iPhone до 15000 грн"></div>
        <button class="btn-primary" onclick="saveCurrentSearch()">Зберегти</button>
    </div>
</div>
