<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мій кабінет — FasTik</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cabinet/cabinet.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="header-top">
        <div class="container">
            <div class="logo">
                <a href="index.html">FasTik</a>
                <span class="logo-dot">❤</span>
            </div>
            <div class="header-actions">
                <select id="langSelect" class="lang-select" onchange="changeLanguage()">
                    <option value="uk">🇺🇦 Українська</option>
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="en">🇬🇧 English</option>
                </select>
                <button class="login-btn" onclick="logout()">Вийти</button>
                <button class="add-btn" onclick="window.location.href='cabinet/pages/create-ad.html'">+ Подати оголошення</button>
            </div>
        </div>
    </div>
</header>

<div class="cabinet-wrapper">
    <div class="container cabinet-container">
        
        <aside class="cabinet-sidebar">
            <div class="user-avatar">
                <div class="avatar-circle" id="userAvatar">В</div>
                <h3 id="userName">Владислав</h3>
                <p id="userEmail">user@example.com</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" data-tab="my-ads">📦 Оголошення</a>
                <a href="#" class="sidebar-link" data-tab="chat">💬 Чат</a>
                <a href="#" class="sidebar-link" data-tab="payments">💰 Платежі та рахунок</a>
                <a href="#" class="sidebar-link" data-tab="rating">⭐ Рейтинг</a>
                <a href="#" class="sidebar-link" data-tab="job-search">🔍 Шукаю роботу</a>
                <a href="#" class="sidebar-link" data-tab="profile">👤 Профіль</a>
                <a href="#" class="sidebar-link" data-tab="settings">⚙️ Налаштування</a>
                <a href="#" class="sidebar-link" data-tab="delivery">🚚 OLX Доставка</a>
                <a href="#" class="sidebar-link" data-tab="favorites">❤️ Обрані</a>
            </nav>
        </aside>

        <main class="cabinet-content">
            <div id="pageContent">
                <!-- Сюди завантажуються вкладки -->
            </div>
        </main>

    </div>
</div>

<script src="script.js"></script>
<script src="cabinet/cabinet.js"></script>
</body>
</html>
