<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особистий кабінет — FasTik</title>
    <link rel="stylesheet" href="cabinet.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <header>
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">FasTik</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Пошук по оголошенням..." onkeydown="if(event.key === 'Enter') searchFromCabinet()">
                <button onclick="searchFromCabinet()">Знайти</button>
            </div>
            <div class="header-right">
                <select id="langSelectCabinet" onchange="changeLanguageCabinet()">
                    <option value="uk">🇺🇦 UA</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
                <button class="add-btn" onclick="window.location.href='index.html?openModal=true'">+ Подати оголошення</button>
            </div>
        </div>
    </header>

    <div class="cabinet-container">
        <aside class="sidebar">
            <div class="profile-header">
                <div class="profile-avatar">В</div>
                <div class="profile-info">
                    <span class="profile-name">Владислав</span>
                </div>
            </div>

            <nav class="profile-nav">
                <ul class="nav-list">
                    <li><a href="#" class="nav-item active" onclick="switchCabinetTab('ads')">Оголошення</a></li>
                    <li><a href="#" class="nav-item" onclick="switchCabinetTab('chats')">Чат</a></li>
                    <li><a href="#" class="nav-item" onclick="switchCabinetTab('payments')">Платежі та рахунок OLX</a></li>
                    <li><a href="#" class="nav-item badge-new" onclick="switchCabinetTab('rating')">Рейтинг</a></li>
                    <li><a href="#" class="nav-item" onclick="switchCabinetTab('jobs')">Шукаю роботу</a></li>
                    <li><a href="#" class="nav-item badge-new" onclick="switchCabinetTab('employers')">Роботодавці на OLX</a></li>
                    <li><a href="#" class="nav-item" onclick="switchCabinetTab('profile-settings')">Профіль</a></li>
                    <li><a href="#" class="nav-item" onclick="switchCabinetTab('settings')">Налаштування</a></li>
                    <li><a href="#" class="nav-item nav-delivery" onclick="switchCabinetTab('delivery')"><span>📦</span> OLX Доставка</a></li>
                </ul>

                <div class="favorites-section">
                    <h4>Обрані:</h4>
                    <ul class="nav-list">
                        <li><a href="#" class="nav-item" onclick="switchCabinetTab('fav-ads')">Оголошення <span class="badge">0</span></a></li>
                        <li><a href="#" class="nav-item" onclick="switchCabinetTab('fav-searches')">Пошуки <span class="badge">0</span></a></li>
                    </ul>
                </div>
                
                <div class="logout-section">
                    <a href="index.html" class="nav-item logout-item">Вийти</a>
                </div>
            </nav>
        </aside>

        <main class="cabinet-content" id="cabinetContent">
            <h2 id="contentTitle">Оголошення</h2>
            <div class="content-body" id="contentBody">
                <p>У вас поки немає активних оголошень.</p>
            </div>
        </main>
    </div>

    <script src="cabinet.js"></script>
</body>
</html>
